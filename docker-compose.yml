services:
  mysql:
    image: mysql:8.0
    container_name: oms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: oms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: oms-redis
    ports:
      - "6379:6379"
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: oms-order-service
    environment:
      APP_PORT: "8080"
      MYSQL_DSN: "root:rootpassword@tcp(mysql:3306)/oms_db?charset=utf8mb4&parseTime=true"
      ORDER_TIMEOUT_MINUTES: "10"
    ports:
      - "8080:8080"
      - "3500:3500"
    networks:
      - oms-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service-dapr:
    image: daprio/daprd:1.12.0
    container_name: oms-order-service-dapr
    command: [
      "./daprd",
      "--app-id", "order-service",
      "--app-port", "8080",
      "--dapr-http-port", "3500",
      "--components-path", "/components"
    ]
    volumes:
      - ./components:/components
    network_mode: "service:order-service"
    depends_on:
      - order-service

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: oms-payment-service
    environment:
      APP_PORT: "8081"
      ORDER_SERVICE_URL: "http://order-service:8080"
    ports:
      - "8081:8081"
      - "3501:3501"
    networks:
      - oms-network
    depends_on:
      order-service:
        condition: service_started
      redis:
        condition: service_healthy

  payment-service-dapr:
    image: daprio/daprd:1.12.0
    container_name: oms-payment-service-dapr
    command: [
      "./daprd",
      "--app-id", "payment-service",
      "--app-port", "8081",
      "--dapr-http-port", "3501",
      "--components-path", "/components"
    ]
    volumes:
      - ./components:/components
    network_mode: "service:payment-service"
    depends_on:
      - payment-service

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: oms-inventory-service
    environment:
      APP_PORT: "8082"
      MYSQL_DSN: "root:rootpassword@tcp(mysql:3306)/oms_db?charset=utf8mb4&parseTime=true"
    ports:
      - "8082:8082"
      - "3502:3502"
    networks:
      - oms-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  inventory-service-dapr:
    image: daprio/daprd:1.12.0
    container_name: oms-inventory-service-dapr
    command: [
      "./daprd",
      "--app-id", "inventory-service",
      "--app-port", "8082",
      "--dapr-http-port", "3502",
      "--components-path", "/components"
    ]
    volumes:
      - ./components:/components
    network_mode: "service:inventory-service"
    depends_on:
      - inventory-service

volumes:
  mysql_data:

networks:
  oms-network:
    driver: bridge
