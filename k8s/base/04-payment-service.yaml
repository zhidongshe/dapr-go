apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
  namespace: oms
data:
  APP_PORT: "8081"
  ORDER_SERVICE_URL: "http://order-service:8080"
  MYSQL_DSN: "root:rootpassword@tcp(mysql:3306)/oms_db?charset=utf8mb4&parseTime=true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: oms
  labels:
    app: payment-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        version: v1
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "payment-service"
        dapr.io/app-port: "8081"
        dapr.io/enable-metrics: "true"
        dapr.io/metrics-port: "9090"
    spec:
      containers:
        - name: payment-service
          image: dapr-go-payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          envFrom:
            - configMapRef:
                name: payment-service-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: oms
spec:
  selector:
    app: payment-service
  ports:
    - port: 8081
      targetPort: 8081
      name: http
    - port: 3501
      targetPort: 3501
      name: dapr
  type: ClusterIP
