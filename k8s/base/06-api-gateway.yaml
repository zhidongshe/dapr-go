apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: oms
data:
  GATEWAY_PORT: "8090"
  ORDER_SERVICE_URL: "http://order-service:8080"
  PAYMENT_SERVICE_URL: "http://payment-service:8081"
  INVENTORY_SERVICE_URL: "http://inventory-service:8082"
  PRODUCT_SERVICE_URL: "http://product-service:8083"
  JWT_SECRET: "your-secret-key-change-in-production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: oms
  labels:
    app: api-gateway
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
    spec:
      containers:
        - name: api-gateway
          image: dapr-go-api-gateway:20260427-211232
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          envFrom:
            - configMapRef:
                name: api-gateway-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: oms
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8090
      targetPort: 8090
      name: http
  type: ClusterIP
