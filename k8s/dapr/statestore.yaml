apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: order-statestore
  namespace: oms
  annotations:
    dapr.io/scopes: order-service,payment-service,inventory-service
spec:
  type: state.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: redisPassword
      value: ""
    - name: actorStateStore
      value: "true"
